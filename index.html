<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>word search</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; }
  canvas { display: block; width: 100vw; height: 100vh; touch-action: none; cursor: grab; }
  canvas.dragging { cursor: grabbing; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

const N = 10000;            // grid is N x N letters
const SEED = 0x5EEDED;      // constant seed: same puzzle every load

// ---- hidden words (spoiler: exact placements below) ----
const WORDS = [
  { w: 'KLARA', x: 3125, y: 6237, dx: 1, dy: 0 },  // horizontal
  { w: 'HAZEL', x: 7841, y: 4410, dx: 0, dy: 1 },  // vertical
];
const placed = new Map();
for (const { w, x, y, dx, dy } of WORDS)
  for (let i = 0; i < w.length; i++)
    placed.set((y + dy * i) * N + (x + dx * i), w.charCodeAt(i) - 65);

// deterministic letter for any cell
function letterIndex(x, y) {
  const p = placed.get(y * N + x);
  if (p !== undefined) return p;
  let h = (Math.imul(x, 0x9E3779B1) ^ Math.imul(y, 0x85EBCA77) ^ SEED) | 0;
  h = Math.imul(h ^ (h >>> 15), 0xC2B2AE3D);
  h = Math.imul(h ^ (h >>> 13), 0x27D4EB2F);
  return ((h ^ (h >>> 16)) >>> 0) % 26;
}

// ---- view state (css px) ----
const MIN_CELL = 6, MAX_CELL = 90;
let cell = 12;              // cell size in css px
let ox = 0, oy = 0;         // top-left of viewport in grid px

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let dpr = 1, bg = '#faf9f6', fg = '#1c1c1c';

const mq = matchMedia('(prefers-color-scheme: dark)');
function setColors() {
  bg = mq.matches ? '#141414' : '#faf9f6';
  fg = mq.matches ? '#e6e4df' : '#1c1c1c';
  document.body.style.background = bg;
}
mq.addEventListener('change', () => { setColors(); schedule(); });

function clampView() {
  ox = Math.min(Math.max(ox, 0), N * cell - innerWidth);
  oy = Math.min(Math.max(oy, 0), N * cell - innerHeight);
}

// glyph atlas: the 26 letters pre-rendered at the current size,
// so the visible grid is cheap drawImage calls instead of fillText
let atlas = null, atlasKey = '';
function buildAtlas() {
  const cd = cell * dpr;
  const key = cd.toFixed(2) + fg;
  if (key === atlasKey) return;
  atlasKey = key;
  const s = Math.ceil(cd);
  atlas = document.createElement('canvas');
  atlas.width = s * 26;
  atlas.height = s;
  const a = atlas.getContext('2d');
  a.fillStyle = fg;
  a.font = (cd * 0.62) + 'px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace';
  a.textAlign = 'center';
  a.textBaseline = 'middle';
  for (let i = 0; i < 26; i++)
    a.fillText(String.fromCharCode(65 + i), i * s + s / 2, s / 2 + cd * 0.04);
}

function render() {
  buildAtlas();
  const w = canvas.width, h = canvas.height;
  const cd = cell * dpr, s = Math.ceil(cd);
  const oxD = ox * dpr, oyD = oy * dpr;
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, w, h);
  const c0 = Math.max(0, Math.floor(oxD / cd));
  const r0 = Math.max(0, Math.floor(oyD / cd));
  const c1 = Math.min(N - 1, Math.floor((oxD + w) / cd));
  const r1 = Math.min(N - 1, Math.floor((oyD + h) / cd));
  for (let r = r0; r <= r1; r++) {
    const py = r * cd - oyD;
    for (let c = c0; c <= c1; c++)
      ctx.drawImage(atlas, letterIndex(c, r) * s, 0, s, s, c * cd - oxD, py, cd, cd);
  }
}

let pending = false;
function schedule() {
  if (pending) return;
  pending = true;
  requestAnimationFrame(() => { pending = false; render(); });
}

function resize() {
  dpr = devicePixelRatio || 1;
  canvas.width = Math.round(innerWidth * dpr);
  canvas.height = Math.round(innerHeight * dpr);
  clampView();
  schedule();
}
addEventListener('resize', resize);

function zoomAt(px, py, factor) {
  const next = Math.min(MAX_CELL, Math.max(MIN_CELL, cell * factor));
  factor = next / cell;
  if (factor === 1) return;
  ox = (ox + px) * factor - px;
  oy = (oy + py) * factor - py;
  cell = next;
  clampView();
  schedule();
}

// ---- pan (drag) and pinch zoom via pointer events ----
const pts = new Map();
canvas.addEventListener('pointerdown', e => {
  canvas.setPointerCapture(e.pointerId);
  pts.set(e.pointerId, { x: e.clientX, y: e.clientY });
  canvas.classList.add('dragging');
});
canvas.addEventListener('pointermove', e => {
  const p = pts.get(e.pointerId);
  if (!p) return;
  if (pts.size === 1) {
    ox -= e.clientX - p.x;
    oy -= e.clientY - p.y;
    clampView();
    schedule();
  } else if (pts.size === 2) {
    const [a, b] = [...pts.values()];
    const oldDist = Math.hypot(a.x - b.x, a.y - b.y);
    const oldMid = { x: (a.x + b.x) / 2, y: (a.y + b.y) / 2 };
    p.x = e.clientX; p.y = e.clientY;
    const [a2, b2] = [...pts.values()];
    const newDist = Math.hypot(a2.x - b2.x, a2.y - b2.y);
    const newMid = { x: (a2.x + b2.x) / 2, y: (a2.y + b2.y) / 2 };
    ox -= newMid.x - oldMid.x;
    oy -= newMid.y - oldMid.y;
    clampView();
    if (oldDist > 0) zoomAt(newMid.x, newMid.y, newDist / oldDist);
    schedule();
    return;
  }
  p.x = e.clientX; p.y = e.clientY;
});
function lift(e) {
  pts.delete(e.pointerId);
  if (pts.size === 0) canvas.classList.remove('dragging');
}
canvas.addEventListener('pointerup', lift);
canvas.addEventListener('pointercancel', lift);

// wheel: plain scroll pans, ctrl/cmd (incl. trackpad pinch) zooms
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  if (e.ctrlKey || e.metaKey) {
    zoomAt(e.clientX, e.clientY, Math.exp(-e.deltaY * 0.01));
  } else {
    ox += e.deltaX;
    oy += e.deltaY;
    clampView();
    schedule();
  }
}, { passive: false });

canvas.addEventListener('dblclick', e => zoomAt(e.clientX, e.clientY, 1.6));

// block Safari's native page pinch-zoom; the canvas handles its own
document.addEventListener('gesturestart', e => e.preventDefault());

// start centered on the grid
ox = (N * cell - innerWidth) / 2;
oy = (N * cell - innerHeight) / 2;

setColors();
resize();
</script>
</body>
</html>
